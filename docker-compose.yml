services:
  backend:
    build: backend/python
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    deploy:
      replicas: 3
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    expose:
      - "8080"

  frontend:
    build: web
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
